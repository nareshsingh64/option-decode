limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name pytrade.co.in www.pytrade.co.in;

    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|phpinfo|info\.php|administrator|vendor|boaform|cgi-bin|\.env|\.git|\.svn|\.hg|server-status|actuator|debug|config|backup|old|staging|beta|test|qa|uat)(/|$) {
        return 444;
    }

    location ~* (^|/)(phpinfo|info)\.php(\.|$|~) {
        return 444;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    return 444;
}

server {
    listen 443 ssl;
    http2 on;
    server_name pytrade.co.in www.pytrade.co.in;

    resolver 127.0.0.11 ipv6=off valid=10s;

    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    client_max_body_size 16m;

    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|phpinfo|info\.php|administrator|vendor|boaform|cgi-bin|\.env|\.git|\.svn|\.hg|server-status|actuator|debug|config|backup|old|staging|beta|test|qa|uat)(/|$) {
        return 444;
    }

    location ~* (^|/)(phpinfo|info)\.php(\.|$|~) {
        return 444;
    }

    location = /login {
        limit_req zone=login_limit burst=5 nodelay;
        set $web_upstream web:3000;
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    location /api/ {
        set $api_upstream api:4000;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        set $web_upstream web:3000;
        proxy_pass http://$web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}

