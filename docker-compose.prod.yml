x-option-decode-app: &option-decode-app
  image: option-decode-app:latest
  build:
    context: .
    dockerfile: Dockerfile
    target: app
    args:
      NEXT_PUBLIC_API_URL: ${APP_PUBLIC_URL}

services:

  web:
    <<: *option-decode-app
    profiles: ["app"]
    working_dir: /workspace
    env_file:
      - .env.production
    command: >
      sh -lc "pnpm --filter @option-decode/web start"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${APP_PUBLIC_URL}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    <<: *option-decode-app
    profiles: ["app"]
    working_dir: /workspace
    env_file:
      - .env.production
    command: >
      sh -lc "pnpm --filter @option-decode/db exec prisma migrate deploy --schema prisma/schema.prisma &&
      pnpm --filter @option-decode/api exec tsx src/server.ts"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      # DATABASE_URL is intentionally NOT set here - it comes from
      # .env.production (via env_file: above) as a single complete
      # connection string. It previously was reconstructed here from
      # ${MYSQL_USER}/${MYSQL_PASSWORD}/${MYSQL_DATABASE}/${DB_HOST_GATEWAY},
      # which required a SEPARATE compose-level .env file (distinct from
      # .env.production) to supply those - `environment:` entries always
      # override `env_file:` ones, so whenever that separate .env file was
      # missing/stale on the host, this silently overrode the correct
      # DATABASE_URL with an empty-credentials one, and only broke on the
      # next full container recreate. MySQL runs natively on the EC2 host
      # (not in a container); if the docker network's bridge subnet ever
      # changes, update the host in .env.production's DATABASE_URL
      # directly (find it via `docker network inspect option-decode_default
      # | grep Gateway` - host.docker.internal/host-gateway doesn't work
      # here since it resolves to the *default* docker0 bridge rather than
      # this project's custom network).
      REDIS_URL: redis://redis:6379/0
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    <<: *option-decode-app
    profiles: ["app"]
    working_dir: /workspace
    env_file:
      - .env.production
    command: >
      sh -lc "pnpm --filter @option-decode/worker exec tsx src/worker.ts"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      # See the same DATABASE_URL note under the api service above - it
      # comes from .env.production via env_file:, not from a compose-level
      # reconstruction.
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles: ["app"]
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - option_decode_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  option_decode_redis:
