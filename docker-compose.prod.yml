x-option-decode-app: &option-decode-app
  image: option-decode-app:latest
  build:
    context: .
    dockerfile: Dockerfile
    target: app
    args:
      NEXT_PUBLIC_API_URL: ${APP_PUBLIC_URL}

services:

  web:
    <<: *option-decode-app
    profiles: ["app"]
    working_dir: /workspace
    env_file:
      - .env.production
    command: >
      sh -lc "pnpm --filter @option-decode/web start"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${APP_PUBLIC_URL}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    <<: *option-decode-app
    profiles: ["app"]
    working_dir: /workspace
    env_file:
      - .env.production
    command: >
      sh -lc "pnpm --filter @option-decode/db exec prisma migrate deploy --schema prisma/schema.prisma &&
      pnpm --filter @option-decode/api exec tsx src/server.ts"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    <<: *option-decode-app
    profiles: ["app"]
    working_dir: /workspace
    env_file:
      - .env.production
    command: >
      sh -lc "pnpm --filter @option-decode/worker exec tsx src/worker.ts"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles: ["app"]
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    command: ["--mysql-native-password=ON"]
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - option_decode_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - option_decode_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  option_decode_mysql:
  option_decode_redis:
